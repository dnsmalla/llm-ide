name: extension-ci

# Type-check, lint, and test the extension on every push / PR that touches it.
# Mirrors mac-ci.yml: a broken extension build or failing test never reaches main.

on:
  push:
    branches: [main]
    paths:
      - 'extension/**'
      - '.github/workflows/extension-ci.yml'
  pull_request:
    paths:
      - 'extension/**'
      - '.github/workflows/extension-ci.yml'

concurrency:
  group: extension-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-test:
    name: Type-check, lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npm run type-check

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build (bundler)
        run: npm run build
