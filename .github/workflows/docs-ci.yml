name: docs-ci

# Build the mkdocs site in strict mode and lint the markdown on every push / PR
# that touches the docs, so broken links/anchors and malformed pages never land.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'docs-requirements.txt'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/docs-ci.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'docs-requirements.txt'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/docs-ci.yml'

concurrency:
  group: docs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Strict build & markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: docs-requirements.txt

      - name: Install docs dependencies
        run: pip install -r docs-requirements.txt

      - name: Markdown lint
        run: npx --yes markdownlint-cli2 "docs/**/*.md" "!docs/superpowers/**"

      - name: Build site (strict)
        run: mkdocs build --strict
