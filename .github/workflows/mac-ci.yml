name: mac-ci

# Build and test the LlmIdeMac app on every push / PR that touches it.
# Foundational gate so broken builds or failing tests never reach main.

on:
  push:
    branches: [main]
    paths:
      - 'mac/**'
      - '.github/workflows/mac-ci.yml'
  pull_request:
    paths:
      - 'mac/**'
      - '.github/workflows/mac-ci.yml'

concurrency:
  group: mac-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    runs-on: macos-15
    defaults:
      run:
        working-directory: mac
    steps:
      - uses: actions/checkout@v7

      - name: Select latest stable Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show toolchain
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: mac/.build
          key: spm-${{ runner.os }}-${{ hashFiles('mac/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test
